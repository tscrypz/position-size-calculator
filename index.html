<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Position Size Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent-spx: #00d4ff;
    --accent-ndx: #ff6b35;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --green: #00c48c;
    --red: #ff4d6d;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 16px;
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 32px;
  }

  .label-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .instrument-toggle {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .toggle-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .toggle-btn.active-spx {
    border-color: var(--accent-spx);
    color: var(--accent-spx);
    background: rgba(0, 212, 255, 0.06);
  }

  .toggle-btn.active-ndx {
    border-color: var(--accent-ndx);
    color: var(--accent-ndx);
    background: rgba(255, 107, 53, 0.06);
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field:last-child { margin-bottom: 0; }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .field label span {
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
  }

  input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="number"]:focus {
    border-color: var(--accent-spx);
  }

  input[type="number"].ndx-focus:focus {
    border-color: var(--accent-ndx);
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent-spx);
    cursor: pointer;
  }

  input[type="range"].ndx { accent-color: var(--accent-ndx); }

  /* Results */
  .results {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .result-row:last-child { border-bottom: none; }

  .result-label {
    font-size: 12px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .result-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .result-value.highlight-spx { color: var(--accent-spx); font-size: 22px; }
  .result-value.highlight-ndx { color: var(--accent-ndx); font-size: 22px; }

  .result-value.risk { color: var(--red); }
  .result-value.profit { color: var(--green); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0;
  }

  .risk-bar-wrap {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
  }

  .risk-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .risk-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .risk-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
    background: var(--accent-spx);
  }

  .risk-bar-fill.ndx { background: var(--accent-ndx); }

  footer {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="label-tag">FTMO Demo · Futures</div>
  <h1>Position Size Calculator</h1>
  <div class="instrument-toggle">
    <button class="toggle-btn active-spx" id="btn-spx" onclick="setInstrument('spx')">ES1!</button>
    <button class="toggle-btn" id="btn-ndx" onclick="setInstrument('ndx')">NQ1!</button>
  </div>
</header>

<div class="card">
  <div class="field">
    <label>Account Balance (USD) <span id="bal-display">$100,000</span></label>
    <input type="number" id="balance" value="100000" min="1000" step="1000" oninput="calc()" />
  </div>
  <div class="field">
    <label>Risk % <span id="risk-display">1.00%</span></label>
    <input type="range" id="risk-range" min="0.25" max="5" step="0.25" value="1" oninput="syncRisk(this.value)" />
    <input type="number" id="risk-pct" value="1" min="0.1" max="10" step="0.25" oninput="syncRisk(this.value)" style="margin-top:8px" />
  </div>
  <div class="field">
    <label>Stop Loss (points) <span id="sl-display">10 pts</span></label>
    <input type="number" id="sl" value="10" min="0.25" step="0.25" oninput="calc()" />
  </div>
</div>

<div class="results">
  <div class="risk-bar-wrap">
    <div class="risk-bar-label">
      <span>Risk amount</span>
      <span id="risk-bar-pct">1%</span>
    </div>
    <div class="risk-bar-track">
      <div class="risk-bar-fill" id="risk-bar" style="width:20%"></div>
    </div>
  </div>
  <div class="result-row">
    <span class="result-label">Contracts</span>
    <span class="result-value highlight-spx" id="lots">5</span>
  </div>
  <div class="result-row">
    <span class="result-label">Risk $</span>
    <span class="result-value risk" id="risk-usd">$1,000</span>
  </div>
  <div class="result-row">
    <span class="result-label">Max loss</span>
    <span class="result-value risk" id="max-loss">$1,000</span>
  </div>
</div>

<footer>ES $50/pt · NQ $20/pt · whole contracts only · FTMO rules apply</footer>

<script>
  let instrument = 'spx';
  const POINT_VALUE = { spx: 50, ndx: 20 }; // ES $50/pt, NQ $20/pt

  function setInstrument(inst) {
    instrument = inst;
    const btnSpx = document.getElementById('btn-spx');
    const btnNdx = document.getElementById('btn-ndx');
    const lotsEl = document.getElementById('lots');
    const bar = document.getElementById('risk-bar');
    const slInput = document.getElementById('sl');

    if (inst === 'spx') {
      btnSpx.className = 'toggle-btn active-spx';
      btnNdx.className = 'toggle-btn';
      lotsEl.className = 'result-value highlight-spx';
      bar.className = 'risk-bar-fill';
      document.querySelectorAll('input[type="range"]').forEach(r => r.className = '');
      // typical ES SL
      slInput.value = 10;
    } else {
      btnSpx.className = 'toggle-btn';
      btnNdx.className = 'toggle-btn active-ndx';
      lotsEl.className = 'result-value highlight-ndx';
      bar.className = 'risk-bar-fill ndx';
      document.querySelectorAll('input[type="range"]').forEach(r => r.className = 'ndx');
      // typical NQ SL
      slInput.value = 20;
    }
    updateDisplays();
    calc();
  }

  function syncRisk(val) {
    document.getElementById('risk-range').value = val;
    document.getElementById('risk-pct').value = val;
    calc();
  }

  function updateDisplays() {
    const bal = parseFloat(document.getElementById('balance').value) || 0;
    const riskPct = parseFloat(document.getElementById('risk-pct').value) || 0;
    const sl = parseFloat(document.getElementById('sl').value) || 0;

    document.getElementById('bal-display').textContent = '$' + bal.toLocaleString();
    document.getElementById('risk-display').textContent = riskPct.toFixed(2) + '%';
    document.getElementById('sl-display').textContent = sl + ' pts';
  }

  function calc() {
    updateDisplays();

    const bal = parseFloat(document.getElementById('balance').value) || 0;
    const riskPct = parseFloat(document.getElementById('risk-pct').value) || 0;
    const sl = parseFloat(document.getElementById('sl').value) || 1;
    const pointValue = POINT_VALUE[instrument];

    const riskUSD = bal * (riskPct / 100);
    const contracts = Math.floor(riskUSD / (sl * pointValue));
    const maxLoss = contracts * sl * pointValue;

    document.getElementById('lots').textContent = contracts;
    document.getElementById('risk-usd').textContent = '$' + riskUSD.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('max-loss').textContent = '$' + maxLoss.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});

    // risk bar — max visual at 5%
    const barWidth = Math.min((riskPct / 5) * 100, 100);
    document.getElementById('risk-bar').style.width = barWidth + '%';
    document.getElementById('risk-bar-pct').textContent = riskPct + '%';
  }

  calc();
</script>
</body>
</html>
